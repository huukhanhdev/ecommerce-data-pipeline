name: 'ecommerce_dbt'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_dbt'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ecommerce_dbt:
    staging:
      +materialized: view
      +schema: staging
      +database: "{{ env_var('OLAP_STAGING_DB', 'staging') }}"
    marts:
      +materialized: table
      +schema: analytics
      +database: "{{ env_var('OLAP_ANALYTICS_DB', 'analytics') }}"
    reports:
      +materialized: table
      +schema: analytics
      +database: "{{ env_var('OLAP_ANALYTICS_DB', 'analytics') }}"
