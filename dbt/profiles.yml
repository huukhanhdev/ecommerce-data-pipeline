ecommerce_dbt:
  target: dev
  outputs:
    dev:
      type: clickhouse
      host: "{{ env_var('OLAP_HOST', 'localhost') }}"
      port: "{{ env_var('OLAP_PORT', '8123') | int }}"
      user: "{{ env_var('OLAP_USER', 'default') }}"
      password: "{{ env_var('OLAP_PASSWORD', '') }}"
      database: "{{ env_var('OLAP_STAGING_DB', 'staging') }}"
      schema: "{{ env_var('OLAP_STAGING_DB', 'staging') }}"
      threads: 4
